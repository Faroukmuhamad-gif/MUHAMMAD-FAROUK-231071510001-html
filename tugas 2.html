<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to Google Sheets</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2563eb; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        h3 { color: #333; margin-top: 25px; border-bottom: 1px solid #ddd; padding-bottom: 5px; font-size: 18px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: sans-serif; }
        .btn-submit { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #16a34a; }
        .loading { display: none; text-align: center; color: #2563eb; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulir Data Terpadu</h2>
    <form id="my-form">
        
        <h3>Data Pribadi</h3>
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="form-group">
            <label>Pendidikan</label>
            <input list="edulist" name="pendidikan" placeholder="Cari atau ketik...">
            <datalist id="edulist">
                <option value="SMA"> 
                <option value="D3"> 
                <option value="S1"> 
                <option value="S2">
            </datalist>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3" placeholder="Masukkan alamat lengkap..." required></textarea>
        </div>

        <h3>Data Bank</h3>
        <div class="form-group">
            <label>Nama Bank</label>
            <input list="banklist" name="nama_bank" placeholder="Contoh: BCA, MANDIRI, BRI">
            <datalist id="banklist">
                <option value="BCA"> 
                <option value="MANDIRI"> 
                <option value="BRI">
                <option value="BSI">
            </datalist>
        </div>
        <div class="form-group">
            <label>No Rekening</label>
            <input type="number" name="no_rek">
        </div>

        <h3>Data Transaksi</h3>
        <div class="form-group">
            <label>Jenis Transaksi</label>
            <select name="jenis_trans" required>
                <option value="" disabled selected>-- Pilih Jenis Transaksi --</option>
                <option value="Setoran">Setoran</option>
                <option value="Penarikan">Penarikan</option>
                <option value="Transfer">Transfer</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        <div class="form-group">
            <label>Uraian</label>
            <input type="text" name="uraian" placeholder="Keterangan transaksi...">
        </div>
        <div class="form-group">
            <label>Debet (Rp)</label>
            <input type="number" name="nominal_debet" value="0" min="0">
        </div>
        <div class="form-group">
            <label>Kredit (Rp)</label>
            <input type="number" name="nominal_kredit" value="0" min="0">
        </div>
<nav>
    <a href="index.html">Kembali ke Home</a>
        <button type="submit" class="btn-submit" id="submit-btn">KIRIM KE SPREADSHEET</button>
        <div id="loader" class="loading">Sedang mengirim data... Mohon tunggu.</div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwF7MjXm4segQGC_LPPDVNF-aJPppG0H4FbtjymnmHEl5oGTVn-aqjZN7kb8asc0bJXbg/exec';
    const form = document.getElementById('my-form');
    const btn = document.getElementById('submit-btn');
    const loader = document.getElementById('loader');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.style.display = 'none';
        loader.style.display = 'block';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.style.display = 'block';
                loader.style.display = 'none';
                alert('Berhasil! Data sudah masuk ke Google Sheets.');
                form.reset();
            })
            .catch(error => {
                btn.style.display = 'block';
                loader.style.display = 'none';
                alert('Gagal mengirim data! ' + error.message);
            });
    });
</script>

</body>
</html>
