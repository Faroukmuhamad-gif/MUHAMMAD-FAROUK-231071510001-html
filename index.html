<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form to Google Sheets</title>
    <style>
        /* CSS yang sama seperti sebelumnya (Diringkas untuk efisiensi) */
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2563eb; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-submit { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .loading { display: none; text-align: center; color: blue; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Formulir Data Terpadu</h2>
    <form id="my-form">
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="form-group">
            <label>Pendidikan</label>
            <input list="edulist" name="pendidikan" placeholder="Cari...">
            <datalist id="edulist">
                <option value="SMA"> <option value="S1"> <option value="S2">
            </datalist>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <h3>Data Bank</h3>
        <div class="form-group">
            <label>Nama Bank</label>
            <input list="banklist" name="nama_bank">
            <datalist id="banklist">
                <option value="BCA"> <option value="MANDIRI"> <option value="BRI">
            </datalist>
        </div>
        <div class="form-group">
            <label>No Rekening</label>
            <input type="number" name="no_rek">
        </div>

        <h3>Transaksi</h3>
        <div class="form-group">
            <label>Uraian</label>
            <input type="text" name="uraian">
        </div>
        <div class="form-group">
            <label>Debet (Rp)</label>
            <input type="number" name="nominal_debet" value="0">
        </div>
        <div class="form-group">
            <label>Kredit (Rp)</label>
            <input type="number" name="nominal_kredit" value="0">
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">KIRIM KE SPREADSHEET</button>
        <div id="loader" class="loading">Sedang mengirim data... Mohon tunggu.</div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzPd2xvNW-YRt_TVwk-m0z3O4WHMAR-VbM2of1Z4k9iGVqBX25mplSsms1sBo4gmOWdNg/exec';
    const form = document.getElementById('my-form');
    const btn = document.getElementById('submit-btn');
    const loader = document.getElementById('loader');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.style.display = 'none';
        loader.style.display = 'block';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                btn.style.display = 'block';
                loader.style.display = 'none';
                alert('Berhasil! Data sudah masuk ke Google Sheets.');
                form.reset();
            })
            .catch(error => {
                btn.style.display = 'block';
                loader.style.display = 'none';
                alert('Error!', error.message);
            });
    });
</script>

</body>
</html>
