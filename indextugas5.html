<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas KUB Nelayan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .header { background-color: #0284c7; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .btn-excel { background-color: #10b981; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-excel:hover { background-color: #059669; }

        /* Mini Dashboard Cards */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #0284c7; position: relative; }
        .card.income { border-left-color: #10b981; }
        .card.expense { border-left-color: #ef4444; }
        .card h3 { font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .card .amount { font-size: 24px; font-weight: 700; color: #0f172a; }
        
        /* Tooltip Setup */
        .tooltip-icon { display: inline-block; width: 18px; height: 18px; background: #cbd5e1; color: white; border-radius: 50%; text-align: center; font-size: 12px; line-height: 18px; cursor: help; margin-left: 5px; position: relative; }
        .tooltip-icon::after { content: attr(data-tooltip); position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s; }
        .tooltip-icon:hover::after { opacity: 1; }

        /* Form Section */
        .form-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-section h2 { font-size: 18px; margin-bottom: 20px; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; color: #475569; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 5px; font-family: inherit; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-submit { background-color: #0284c7; color: white; border: none; padding: 12px 20px; font-size: 14px; font-weight: 600; border-radius: 5px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background-color: #0369a1; }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Status Message */
        #status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; font-size: 14px; text-align: center; }
        .status-success { background-color: #d1fae5; color: #065f46; }
        .status-error { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>⚓ Dashboard Keuangan KUB Nelayan</h1>
            <a href="https://docs.google.com/spreadsheets/d/1NVHzd-zmhPG5y2puJMw3zrRpLkp_8rl_Ee02-2iBUhU/export?format=xlsx" class="btn-excel" target="_blank">📥 Unduh Data (Excel)</a>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Saldo Tersisa <span class="tooltip-icon" data-tooltip="Sisa kas per tanggal hari ini">?</span></h3>
                <div class="amount">Rp <span id="saldo-display">...</span></div>
            </div>
            <div class="card income">
                <h3>Pemasukan Kas <span class="tooltip-icon" data-tooltip="Total uang masuk (Debit)">?</span></h3>
                <div class="amount">Rp <span id="masuk-display">...</span></div>
            </div>
            <div class="card expense">
                <h3>Pengeluaran Kas <span class="tooltip-icon" data-tooltip="Total uang keluar (Kredit)">?</span></h3>
                <div class="amount">Rp <span id="keluar-display">...</span></div>
            </div>
        </div>

        <div class="form-section">
            <h2>➕ Tambah Transaksi Baru</h2>
            <form id="kasForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tanggal Transaksi</label>
                        <input type="date" id="tanggal" name="tanggal" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Jenis Transaksi</label>
                        <select id="jenis" name="jenis" class="form-control" required>
                            <option value="" disabled selected>-- Pilih --</option>
                            <option value="Pemasukan">Pemasukan (Uang Masuk)</option>
                            <option value="Pengeluaran">Pengeluaran (Uang Keluar)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nominal (Rp)</label>
                    <input type="number" id="nominal" name="nominal" class="form-control" placeholder="Contoh: 150000" min="0" required>
                </div>

                <div class="form-group">
                    <label>Keterangan Transaksi</label>
                    <input type="text" id="keterangan" name="keterangan" class="form-control" placeholder="Contoh: Hasil Lelang Ikan Tongkol / Pembelian Solar" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Simpan Transaksi</button>
                <div id="status-msg"></div>
            </form>
        </div>
    </div>

    <script>
        // Set tanggal default ke hari ini
        document.getElementById('tanggal').valueAsDate = new Date();

        // LOGIKA SUBMIT FORM KE GOOGLE SHEETS
        const form = document.getElementById('kasForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('status-msg');

        // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA NANTI
        const SCRIPT_URL = 'URL_WEB_APP_ANDA_DISINI'; 

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = 'Menyimpan...';
            
            // Ambil data form
            const formData = new FormData(form);
            
            // Konversi FormData ke parameter URL untuk fetch (x-www-form-urlencoded)
            const data = new URLSearchParams();
            for (const pair of formData) {
                data.append(pair[0], pair[1]);
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: data
            })
            .then(response => response.json())
            .then(result => {
                if(result.result === "success") {
                    statusMsg.className = 'status-success';
                    statusMsg.innerText = '✅ Transaksi berhasil disimpan ke Spreadsheet!';
                    form.reset();
                    document.getElementById('tanggal').valueAsDate = new Date();
                } else {
                    throw new Error("Gagal menyimpan");
                }
            })
            .catch(error => {
                statusMsg.className = 'status-error';
                statusMsg.innerText = '❌ Terjadi kesalahan. Pastikan URL Script benar.';
            })
            .finally(() => {
                statusMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Simpan Transaksi';
                
                // Sembunyikan pesan setelah 5 detik
                setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
            });
        });

        // Catatan: Untuk menampilkan data real-time di Dashboard (Total Saldo, Masuk, Keluar),
        // dibutuhkan request GET terpisah ke Apps Script untuk membaca data, 
        // namun karena batasan kuota API Google, dashboard angka di HTML umumnya bersifat statis 
        // kecuali di-refresh melalui script pembacaan khusus.
    </script>
</body>
</html>
