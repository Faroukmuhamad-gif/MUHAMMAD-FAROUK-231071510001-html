<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sajian Data</title>
    <link rel="stylesheet" href="style.css">

<body>

    <nav>

    <div class="container">

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        </header>

        <section id="main-dashboard">
            <iframe 
                width="100%" 
                height="600" 
                src="https://lookerstudio.google.com/embed/reporting/6620586e-8260-466d-9788-756910609b55/page/p_iaxRkxOVRRQ" 
                frameborder="0" 
                style="border:0; border-radius: 10px;" 
                allowfullscreen 
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </section>

        <footer style="margin-top: 50px; font-size: 0.9em; color: #666;">
            <blockquote style="border-left: 4px solid #74ebd5; padding-left: 15px; text-align: left;">
                *Data diperbarui secara otomatis setiap 24 jam melalui sinkronisasi cloud database.
            </blockquote>
